x-dockerfiles-dir:
  &dockerfiles-dir
  context: dockerfiles/

services:
  # java-executor:
  #   build:
  #     <<: *dockerfiles-dir
  #     dockerfile: java.Dockerfile
  #   networks:
  #     - lang-exec

  python-executor:
    build:
      <<: *dockerfiles-dir
      dockerfile: python.Dockerfile
    networks:
      - lang-exec

  application:
    build: .
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./tmp/code:/media/code"
      - "./logs:/app/logs"
    environment:
      - CODE_VOLUME_HOST_PATH=${PWD}/tmp/code
    ports:
      - "8000:8000"
    depends_on:
      - python-executor
    networks:
      - lang-exec
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  lang-exec:
    driver: bridge
